<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>数式・構造式エディタ (Ketcher)</title>
  
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  
  <!-- html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 2rem; background: #f8fafc; color: #333; }
    .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    h1 { color: #005bac; margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; text-align: center; }
    
    .tab-header { display: flex; gap: 10px; margin-bottom: 1.5rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
    .editor-tab { padding: 10px 20px; font-size: 1rem; font-weight: bold; cursor: pointer; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 8px; transition: all 0.2s; color: #64748b; }
    .editor-tab:hover { background: #e2e8f0; color: #0f172a; }
    .editor-tab.active { background: #005bac; color: #fff; border-color: #005bac; box-shadow: 0 4px 6px rgba(0, 91, 172, 0.2); }
    
    .tab-panel { display: none; animation: fadeIn 0.3s; }
    .tab-panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* LaTeX Editor */
    textarea { width: 100%; height: 150px; padding: 1rem; font-size: 1.1rem; font-family: monospace; border: 2px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; resize: vertical; margin-bottom: 1rem; }
    textarea:focus { outline: none; border-color: #005bac; box-shadow: 0 0 0 3px rgba(0, 91, 172, 0.1); }
    .preview-box { border: 2px dashed #cbd5e1; padding: 2rem; min-height: 100px; border-radius: 8px; background: #f8fafc; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #94a3b8; margin-bottom: 1rem; transition: all 0.3s; }
    .preview-box.has-content { border-style: solid; border-color: #e2e8f0; background: #fff; color: #333; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; background: #f1f5f9; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
    .tool-btn { padding: 6px 12px; font-size: 0.9rem; font-family: monospace; cursor: pointer; background: #fff; border: 1px solid #cbd5e1; border-radius: 4px; transition: all 0.2s; }
    .tool-btn:hover { background: #005bac; color: #fff; border-color: #005bac; }

    /* Button and Status */
    .action-btn { display: block; width: 100%; padding: 1rem; font-size: 1.2rem; font-weight: bold; background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); }
    .action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(16, 185, 129, 0.3); }
    .action-btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }
    
    .export-status { margin-top: 1rem; padding: 1rem; border-radius: 8px; text-align: center; font-weight: bold; display: none; }
    .export-status.success { display: block; background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .export-status.error { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    .hint { font-size: 0.9rem; color: #64748b; margin-top: 0.5rem; }

    /* Projections (Fischer / Haworth) */
    .proj-tabs { display: flex; gap: 5px; margin-bottom: 1rem; }
    .proj-tab { padding: 5px 15px; font-size: 0.9rem; cursor: pointer; background: #e2e8f0; border: none; border-radius: 4px; transition: 0.2s; }
    .proj-tab.active { background: #0f172a; color: #fff; }
    .proj-panel { display: none; }
    .proj-panel.active { display: block; }
    .builder-layout { display: flex; gap: 20px; align-items: flex-start; }
    .config-panel { flex: 1; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
    .preview-panel { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; background: #fff; border: 2px dashed #cbd5e1; border-radius: 8px; min-height: 200px; }
    .form-row { margin-bottom: 10px; }
    .form-row label { display: block; font-size: 0.85rem; font-weight: bold; color: #475569; margin-bottom: 3px; }
    .form-row select, .form-row input { width: 100%; padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.9rem; }
    .form-row select:focus, .form-row input:focus { outline: none; border-color: #005bac; }
    
    /* Input layout for substituents */
    .subs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .subs-grid.haworth { grid-template-columns: 1fr 1fr; }
  </style>
</head>
<body>

  <div class="container">
    <h1>📝 クイズ画像ジェネレータ</h1>
    
    <div class="tab-header">
      <button class="editor-tab active" onclick="switchTab('latex')">📐 数式 (LaTeX)</button>
      <button class="editor-tab" onclick="switchTab('structure')">🔬 構造式 (Ketcher)</button>
      <button class="editor-tab" onclick="switchTab('projection')">🧪 投影式 (糖類など)</button>
    </div>

    <!-- ===== Tab 1: LaTeX Editor ===== -->
    <div id="tab-latex" class="tab-panel active">
      <div class="toolbar">
        <button class="tool-btn" onclick="insertLatex('\\frac{分子}{分母}')">分数</button>
        <button class="tool-btn" onclick="insertLatex('^{上付き}')">上付き</button>
        <button class="tool-btn" onclick="insertLatex('_{下付き}')">下付き</button>
        <button class="tool-btn" onclick="insertLatex('\\sqrt{x}')">ルート</button>
        <button class="tool-btn" onclick="insertLatex('\\int_{a}^{b} x dx')">積分</button>
        <button class="tool-btn" onclick="insertLatex('\\sum_{n=1}^{\\infty} a_n')">シグマ</button>
        <button class="tool-btn" onclick="insertLatex('\\rightarrow')">→</button>
        <button class="tool-btn" onclick="insertLatex('\\rightleftharpoons')">⇌</button>
        <button class="tool-btn" onclick="insertLatex('\\text{日本語}')">テキスト</button>
        <button class="tool-btn" onclick="insertLatex('\\blacksquare')">■ (虫食い)</button>
        <button class="tool-btn" onclick="insertLatex('?')">? (虫食い)</button>
      </div>

      <textarea id="latex-input" placeholder="ここにLaTeXを入力してください。&#10;例: \text{H}_2 + \frac{1}{2}\text{O}_2 \rightarrow \text{H}_2\text{O}" oninput="updateLatexPreview()"></textarea>
      
      <div class="preview-box" id="latex-preview">
        ここにプレビューが表示されます
      </div>
    </div>

    <!-- ===== Tab 2: Structure Editor (Ketcher) ===== -->
    <div id="tab-structure" class="tab-panel">
      <p class="hint" style="margin-top:0;">🖱️ 世界標準の高性能エディタ「Ketcher」です。ツールバーから直感的に描画が可能です。</p>
      <div id="ketcher-wrapper" style="width:100%; height:600px; border:1px solid #e2e8f0; border-radius:8px; overflow:hidden; position:relative; background:#fff;">
        <iframe id="ketcher-frame" src="/ketcher/standalone/index.html" style="width:100%; height:100%; border:none;"></iframe>
      </div>
    </div>

    <!-- ===== Tab 3: Fischer / Haworth ===== -->
    <div id="tab-projection" class="tab-panel">
      <div class="proj-tabs">
        <button class="proj-tab active" onclick="switchProjection('fischer')">📊 Fischer式</button>
        <button class="proj-tab" onclick="switchProjection('haworth')">🔄 Haworth式</button>
      </div>

      <!-- Fischer Builder -->
      <div id="proj-fischer" class="proj-panel active">
        <div class="builder-layout">
          <div class="config-panel">
            <h4>⚙️ Fischer式の設定</h4>
            <div class="form-row">
              <label>炭素数 (主鎖)</label>
              <select id="fischer-chain-length" onchange="renderFischer()">
                <option value="3">3 (例: グリセルアルデヒド)</option>
                <option value="4">4 (例: エリトロース)</option>
                <option value="5">5 (例: リボース)</option>
                <option value="6" selected>6 (例: グルコース)</option>
              </select>
            </div>
            <div class="form-row">
              <label>上端 (C1)</label>
              <input type="text" id="fischer-top" value="CHO" oninput="renderFischer()">
            </div>
            <div id="fischer-subs-container"></div>
            <div class="form-row">
              <label>下端 (Cn)</label>
              <input type="text" id="fischer-bottom" value="CH₂OH" oninput="renderFischer()">
            </div>
          </div>
          <div class="preview-panel" id="fischer-preview-container">
            <div id="fischer-preview"></div>
          </div>
        </div>
      </div>

      <!-- Haworth Builder -->
      <div id="proj-haworth" class="proj-panel">
        <div class="builder-layout">
          <div class="config-panel">
            <h4>⚙️ Haworth式の設定</h4>
            <div class="form-row">
              <label>環の種類</label>
              <select id="haworth-ring-type" onchange="renderHaworth()">
                <option value="pyranose" selected>ピラノース (六員環)</option>
                <option value="furanose">フラノース (五員環)</option>
              </select>
            </div>
            <div class="form-row">
              <label>アノマー</label>
              <select id="haworth-anomer" onchange="renderHaworth()">
                <option value="alpha">α (下向き)</option>
                <option value="beta" selected>β (上向き)</option>
              </select>
            </div>
            <div id="haworth-subs-container"></div>
          </div>
          <div class="preview-panel" id="haworth-preview-container">
            <div id="haworth-preview"></div>
          </div>
        </div>
      </div>
      <p class="hint" style="margin-top:10px;">💡 入力欄に「■」や「?」を入れると、虫食い問題にできます。</p>
    </div>

    <hr style="border:0; border-top:1px solid #e2e8f0; margin: 2rem 0;">

    <button class="action-btn" id="export-btn" onclick="exportAndUpload()">🖼️ 画像を生成してダッシュボード（画像プール）に送る</button>
    <div id="export-status" class="export-status"></div>
  </div>

  <script>
    /* ========================================
       Tab Switching
    ======================================== */
    var currentTab = 'latex';

    function switchTab(tabId) {
      document.querySelectorAll('.editor-tab').forEach(function(btn) { btn.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function(panel) { panel.classList.remove('active'); });
      document.getElementById('tab-' + tabId).classList.add('active');
      currentTab = tabId;

      // Highlight the correct tab button
      var tabs = document.querySelectorAll('.editor-tab');
      var tabMap = { 'latex': 0, 'structure': 1, 'projection': 2 };
      if (tabMap[tabId] !== undefined) tabs[tabMap[tabId]].classList.add('active');

      // Ketcher is loaded automatically via iframe
    }

    /* ========================================
       LaTeX Editor
    ======================================== */
    function updateLatexPreview() {
      var input = document.getElementById('latex-input').value.trim();
      var preview = document.getElementById('latex-preview');
      if (!input) {
        preview.innerHTML = 'ここにプレビューが表示されます';
        preview.classList.remove('has-content');
        return;
      }
      try {
        katex.render(input, preview, { throwOnError: false, displayMode: true, trust: true });
        preview.classList.add('has-content');
      } catch (e) {
        preview.innerHTML = '<span style="color:#e11d48;">⚠️ ' + e.message + '</span>';
        preview.classList.remove('has-content');
      }
    }

    function insertLatex(template) {
      var input = document.getElementById('latex-input');
      var start = input.selectionStart;
      var end = input.selectionEnd;
      var text = input.value;
      input.value = text.substring(0, start) + template + text.substring(end);
      input.focus();
      // Place cursor inside the template (before the last closing brace if exists)
      var cursorPos = start + template.length;
      var bracePos = template.lastIndexOf('}');
      if (bracePos > 0) cursorPos = start + bracePos;
      input.setSelectionRange(cursorPos, cursorPos);
      updateLatexPreview();
    }



    /* ========================================
       Projection Tab Switching
    ======================================== */
    function switchProjection(type) {
      document.querySelectorAll('.proj-tab').forEach(function(btn) { btn.classList.remove('active'); });
      document.querySelectorAll('.proj-panel').forEach(function(panel) { panel.classList.remove('active'); });
      
      var targetTab = type === 'fischer' ? 0 : 1;
      document.querySelectorAll('.proj-tab')[targetTab].classList.add('active');
      document.getElementById('proj-' + type).classList.add('active');
      
      if (type === 'fischer') renderFischer();
      else renderHaworth();
    }

    /* ========================================
       Fischer Projection Builder
    ======================================== */
    var fischerDefaults = {
      '3': [ {L: 'H', R: 'OH'} ], // Glyceraldehyde
      '4': [ {L: 'H', R: 'OH'}, {L: 'H', R: 'OH'} ], // Erythrose
      '5': [ {L: 'H', R: 'OH'}, {L: 'H', R: 'OH'}, {L: 'H', R: 'OH'} ], // Ribose
      '6': [ {L: 'H', R: 'OH'}, {L: 'HO', R: 'H'}, {L: 'H', R: 'OH'}, {L: 'H', R: 'OH'} ] // Glucose
    };

    function generateFischerInputs() {
      var len = parseInt(document.getElementById('fischer-chain-length').value);
      var chiralCenters = len - 2;
      var container = document.getElementById('fischer-subs-container');
      
      // Preserve existing values if possible
      var existingL = [], existingR = [];
      for (var i = 1; i <= 4; i++) {
        var lInput = document.getElementById('fischer-l' + i);
        var rInput = document.getElementById('fischer-r' + i);
        if (lInput) existingL[i] = lInput.value;
        if (rInput) existingR[i] = rInput.value;
      }

      var defs = fischerDefaults[len];
      var html = '';
      for (var i = 1; i <= chiralCenters; i++) {
        var valL = existingL[i] !== undefined ? existingL[i] : defs[i-1].L;
        var valR = existingR[i] !== undefined ? existingR[i] : defs[i-1].R;
        html += '<div class="form-row subs-grid">';
        html += '<div><label>C' + (i+1) + ' 左側</label><input type="text" id="fischer-l' + i + '" value="' + valL + '" oninput="renderFischer()"></div>';
        html += '<div><label>C' + (i+1) + ' 右側</label><input type="text" id="fischer-r' + i + '" value="' + valR + '" oninput="renderFischer()"></div>';
        html += '</div>';
      }
      container.innerHTML = html;
    }

    function renderFischer() {
      var len = parseInt(document.getElementById('fischer-chain-length').value);
      var top = document.getElementById('fischer-top').value;
      var bottom = document.getElementById('fischer-bottom').value;
      var chiralCenters = len - 2;
      
      var spacing = 40;
      var width = 200;
      var height = (chiralCenters + 1) * spacing + 40;
      var cx = width / 2;
      var startY = 40;

      var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + width + ' ' + height + '" width="' + width + '" height="' + height + '">';
      svg += '<style>text { font-family: Arial, sans-serif; font-size: 16px; dominant-baseline: middle; text-anchor: middle; } .line { stroke: #000; stroke-width: 2; }</style>';
      
      // Draw vertical backbone
      svg += '<line class="line" x1="' + cx + '" y1="' + startY + '" x2="' + cx + '" y2="' + (startY + chiralCenters * spacing) + '" />';
      
      // Draw Top & Bottom
      svg += '<text x="' + cx + '" y="' + (startY - 20) + '">' + top + '</text>';
      svg += '<text x="' + cx + '" y="' + (startY + chiralCenters * spacing + 20) + '">' + bottom + '</text>';

      // Draw horizontal bonds and substituents
      for (var i = 1; i <= chiralCenters; i++) {
        var y = startY + (i - 0.5) * spacing;
        var lText = document.getElementById('fischer-l' + i) ? document.getElementById('fischer-l' + i).value : '';
        var rText = document.getElementById('fischer-r' + i) ? document.getElementById('fischer-r' + i).value : '';
        
        svg += '<line class="line" x1="' + (cx - 30) + '" y1="' + y + '" x2="' + (cx + 30) + '" y2="' + y + '" />';
        svg += '<text x="' + (cx - 45) + '" y="' + y + '">' + lText + '</text>';
        svg += '<text x="' + (cx + 45) + '" y="' + y + '">' + rText + '</text>';
      }
      
      svg += '</svg>';
      document.getElementById('fischer-preview').innerHTML = svg;
    }

    /* ========================================
       Haworth Projection Builder
    ======================================== */
    var haworthDefaults = {
      'pyranose': [ {t: 'H', b: 'OH'}, {t: 'OH', b: 'H'}, {t: 'H', b: 'OH'}, {t: 'CH₂OH', b: 'H'} ], // D-Glucose (C2 to C5)
      'furanose': [ {t: 'H', b: 'OH'}, {t: 'OH', b: 'H'}, {t: 'CH₂OH', b: 'H'} ] // D-Ribose roughly
    };

    function generateHaworthInputs() {
      var type = document.getElementById('haworth-ring-type').value;
      var container = document.getElementById('haworth-subs-container');
      var numSubs = type === 'pyranose' ? 4 : 3;
      var defs = haworthDefaults[type];

      // Preserve existing
      var existingT = [], existingB = [];
      for (var i = 1; i <= 4; i++) {
        var tInput = document.getElementById('haworth-t' + i);
        var bInput = document.getElementById('haworth-b' + i);
        if (tInput) existingT[i] = tInput.value;
        if (bInput) existingB[i] = bInput.value;
      }

      var html = '';
      for (var i = 1; i <= numSubs; i++) {
        var valT = existingT[i] !== undefined ? existingT[i] : defs[i-1].t;
        var valB = existingB[i] !== undefined ? existingB[i] : defs[i-1].b;
        html += '<div class="form-row subs-grid haworth">';
        html += '<div><label>C' + (i+1) + ' 上</label><input type="text" id="haworth-t' + i + '" value="' + valT + '" oninput="renderHaworth()"></div>';
        html += '<div><label>C' + (i+1) + ' 下</label><input type="text" id="haworth-b' + i + '" value="' + valB + '" oninput="renderHaworth()"></div>';
        html += '</div>';
      }
      container.innerHTML = html;
    }

    function renderHaworth() {
      var type = document.getElementById('haworth-ring-type').value;
      var anomer = document.getElementById('haworth-anomer').value;
      
      var width = 300;
      var height = 200;
      var cx = width / 2;
      var cy = height / 2;

      var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + width + ' ' + height + '" width="' + width + '" height="' + height + '">';
      svg += '<style>text { font-family: Arial, sans-serif; font-size: 16px; dominant-baseline: middle; text-anchor: middle; } .line { stroke: #000; stroke-width: 2; stroke-linejoin: round; } .bold-line { stroke: #000; stroke-width: 4; stroke-linecap: round; } .bond { stroke: #000; stroke-width: 1.5; }</style>';

      if (type === 'pyranose') {
        // Hexagon coordinates
        var pts = [
          {x: cx + 60, y: cy},      // C1 (right)
          {x: cx + 30, y: cy + 30}, // C2 (bottom right)
          {x: cx - 30, y: cy + 30}, // C3 (bottom left)
          {x: cx - 60, y: cy},      // C4 (left)
          {x: cx - 30, y: cy - 30}, // C5 (top left)
          {x: cx + 30, y: cy - 30}  // O (top right)
        ];
        
        // Draw Ring
        svg += '<polygon points="' + pts[0].x+','+pts[0].y + ' ' + pts[1].x+','+pts[1].y + ' ' + pts[2].x+','+pts[2].y + ' ' + pts[3].x+','+pts[3].y + ' ' + pts[4].x+','+pts[4].y + ' ' + pts[5].x+','+pts[5].y + '" fill="none" class="line"/>';
        // Bold front bonds
        svg += '<line class="bold-line" x1="'+pts[1].x+'" y1="'+pts[1].y+'" x2="'+pts[2].x+'" y2="'+pts[2].y+'" />';
        svg += '<line class="bold-line" x1="'+pts[0].x+'" y1="'+pts[0].y+'" x2="'+pts[1].x+'" y2="'+pts[1].y+'" />';
        svg += '<line class="bold-line" x1="'+pts[2].x+'" y1="'+pts[2].y+'" x2="'+pts[3].x+'" y2="'+pts[3].y+'" />';

        // Oxygen atom (white bg to hide line underneath)
        svg += '<circle cx="'+pts[5].x+'" cy="'+pts[5].y+'" r="12" fill="#fff" />';
        svg += '<text x="'+pts[5].x+'" y="'+pts[5].y+'">O</text>';

        // C1 Anomeric substituent
        var c1T = anomer === 'beta' ? 'OH' : 'H';
        var c1B = anomer === 'beta' ? 'H' : 'OH';
        svg += drawSubstituent(pts[0].x, pts[0].y, c1T, c1B);

        // C2 to C5 Substituents
        for (var i = 1; i <= 4; i++) {
          var pt = pts[i];
          var tText = document.getElementById('haworth-t' + i) ? document.getElementById('haworth-t' + i).value : '';
          var bText = document.getElementById('haworth-b' + i) ? document.getElementById('haworth-b' + i).value : '';
          svg += drawSubstituent(pt.x, pt.y, tText, bText);
        }

      } else if (type === 'furanose') {
        // Pentagon coordinates
        var pts = [
          {x: cx + 50, y: cy},      // C1 (right)
          {x: cx + 20, y: cy + 30}, // C2 (bottom right)
          {x: cx - 20, y: cy + 30}, // C3 (bottom left)
          {x: cx - 50, y: cy},      // C4 (left)
          {x: cx, y: cy - 35}       // O (top)
        ];

        // Draw Ring
        svg += '<polygon points="' + pts[0].x+','+pts[0].y + ' ' + pts[1].x+','+pts[1].y + ' ' + pts[2].x+','+pts[2].y + ' ' + pts[3].x+','+pts[3].y + ' ' + pts[4].x+','+pts[4].y + '" fill="none" class="line"/>';
        // Bold front bond
        svg += '<line class="bold-line" x1="'+pts[1].x+'" y1="'+pts[1].y+'" x2="'+pts[2].x+'" y2="'+pts[2].y+'" />';

        // Oxygen atom
        svg += '<circle cx="'+pts[4].x+'" cy="'+pts[4].y+'" r="12" fill="#fff" />';
        svg += '<text x="'+pts[4].x+'" y="'+pts[4].y+'">O</text>';

        // C1 Anomeric
        var c1T = anomer === 'beta' ? 'OH' : 'H';
        var c1B = anomer === 'beta' ? 'H' : 'OH';
        svg += drawSubstituent(pts[0].x, pts[0].y, c1T, c1B);

        // C2 to C4 Substituents
        for (var i = 1; i <= 3; i++) {
          var pt = pts[i];
          var tText = document.getElementById('haworth-t' + i) ? document.getElementById('haworth-t' + i).value : '';
          var bText = document.getElementById('haworth-b' + i) ? document.getElementById('haworth-b' + i).value : '';
          svg += drawSubstituent(pt.x, pt.y, tText, bText);
        }
      }

      svg += '</svg>';
      document.getElementById('haworth-preview').innerHTML = svg;
    }

    function drawSubstituent(x, y, topText, bottomText) {
      var html = '';
      if (topText) {
        html += '<line class="bond" x1="'+x+'" y1="'+y+'" x2="'+x+'" y2="'+(y-25)+'" />';
        html += '<text x="'+x+'" y="'+(y-35)+'" font-size="14">' + topText + '</text>';
      }
      if (bottomText) {
        html += '<line class="bond" x1="'+x+'" y1="'+y+'" x2="'+x+'" y2="'+(y+25)+'" />';
        html += '<text x="'+x+'" y="'+(y+35)+'" font-size="14">' + bottomText + '</text>';
      }
      return html;
    }

    /* ========================================
       Initialization & Setup
    ======================================== */
    document.addEventListener('DOMContentLoaded', function() {
      // Setup inputs for Fischer & Haworth when page loads
      document.getElementById('fischer-chain-length').addEventListener('change', generateFischerInputs);
      generateFischerInputs();
      renderFischer();

      document.getElementById('haworth-ring-type').addEventListener('change', generateHaworthInputs);
      generateHaworthInputs();
      renderHaworth();
    });


    /* ========================================
       Export & Upload Logic
    ======================================== */
    async function exportAndUpload() {
      var btn = document.getElementById('export-btn');
      var status = document.getElementById('export-status');
      
      btn.disabled = true;
      status.className = 'export-status';
      status.style.display = 'block';
      status.textContent = '⏳ 画像を生成中...';

      try {
        var blob = await generatePngBlob();
        if (!blob) throw new Error('画像の生成に失敗しました');

        status.textContent = '⏳ ダッシュボードへ転送中...';
        
        var formData = new FormData();
        // Since this page is standalone, it talks to the Node.js API endpoint we'll create
        formData.append('image_file', blob, 'formula.png');

        var response = await fetch('/api/upload-image-single', { method: 'POST', body: formData });
        var data = await response.json();

        if (response.ok && data.url) {
          status.className = 'export-status success';
          status.innerHTML = '✅ <b>成功！</b> 画像プールに転送されました。<br><a href="/" target="_blank" style="color:#166534;">ダッシュボードに戻って「プールから選ぶ」を押してください。</a>';
        } else {
          throw new Error(data.error || 'アップロードに失敗しました');
        }
      } catch (e) {
        status.className = 'export-status error';
        status.textContent = '❌ ' + e.message;
      }
      btn.disabled = false;
    }

    async function generatePngBlob() {
      if (currentTab === 'latex') {
        return await latexToBlob();
      } else if (currentTab === 'structure') {
        return await ketcherToBlob();
      } else if (currentTab === 'projection') {
        return await svgPreviewToBlob();
      }
      return null;
    }

    async function latexToBlob() {
      var preview = document.getElementById('latex-preview');
      if (!preview.classList.contains('has-content')) {
        throw new Error('プレビューに数式が表示されていません。LaTeXを入力してください。');
      }
      var canvas = await html2canvas(preview, {
        backgroundColor: '#ffffff',
        scale: 3, // High resolution
        logging: false
      });
      return new Promise(function(resolve) { canvas.toBlob(resolve, 'image/png'); });
    }

    async function ketcherToBlob() {
      var ketcherFrame = document.getElementById('ketcher-frame');
      if (!ketcherFrame || !ketcherFrame.contentWindow || !ketcherFrame.contentWindow.ketcher) {
        throw new Error('構造式エディタが読み込み中です。');
      }
      var ketcher = ketcherFrame.contentWindow.ketcher;
      // HTML2Canvasでiframe内部のSVG描画領域をキャプチャする
      var canvas = await html2canvas(ketcherFrame.contentDocument.body, {
        backgroundColor: '#ffffff',
        scale: 2,
        logging: false
      });
      return new Promise(function(resolve) { canvas.toBlob(resolve, 'image/png'); });
    }

    async function svgPreviewToBlob() {
      // Determine which projection is active
      var fischerActive = document.getElementById('proj-fischer').classList.contains('active');
      var previewId = fischerActive ? 'fischer-preview' : 'haworth-preview';
      var svgElement = document.querySelector('#' + previewId + ' svg');
      if (!svgElement) {
        throw new Error('プレビューに構造式が表示されていません。');
      }

      // Convert SVG to PNG via Canvas
      var svgData = new XMLSerializer().serializeToString(svgElement);
      var svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
      var url = URL.createObjectURL(svgBlob);

      return new Promise(function(resolve, reject) {
        var img = new Image();
        img.onload = function() {
          var canvas = document.createElement('canvas');
          canvas.width = img.width * 2;
          canvas.height = img.height * 2;
          var ctx = canvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(url);
          canvas.toBlob(resolve, 'image/png');
        };
        img.onerror = reject;
        img.src = url;
      });
    }
  </script>
</body>
